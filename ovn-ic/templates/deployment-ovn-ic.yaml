{{- define "ovnIcReadinessProbe" }}
exec:
  command:
    - /usr/bin/ovn-appctl
    - -t
    - /var/run/ovn/ovn-ic.ctl
    - version
{{- end }}

{{- if .Values.manifests.deployment_ovn_ic }}
{{- $envAll := . }}

{{- $serviceAccountName := "ovn-ic" }}
{{ tuple $envAll "ovn_ic" $serviceAccountName | include "helm-toolkit.snippets.kubernetes_pod_rbac_serviceaccount" }}

{{- $env_ovn := .Values.pod.envs }}

---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: ovn-ic
  annotations:
    {{ tuple $envAll | include "helm-toolkit.snippets.release_uuid" }}
  labels:
{{ tuple $envAll "ovn-ic" "ovn-ic" | include "helm-toolkit.snippets.kubernetes_metadata_labels" | indent 4 }}
spec:
  replicas: {{ .Values.pod.replicas.ovn_ic }}
  selector:
    matchLabels:
{{ tuple $envAll "ovn-ic" "ovn-ic" | include "helm-toolkit.snippets.kubernetes_metadata_labels" | indent 6 }}
  template:
    metadata:
      labels:
{{ tuple $envAll "ovn-ic" "ovn-ic" | include "helm-toolkit.snippets.kubernetes_metadata_labels" | indent 8 }}
      annotations:
{{ tuple $envAll | include "helm-toolkit.snippets.release_uuid" | indent 8 }}
        configmap-bin-hash: {{ tuple "configmap-bin.yaml" . | include "helm-toolkit.utils.hash" }}
    spec:
      serviceAccountName: {{ $serviceAccountName }}
      {{- if and .Values.pod.tolerations.ovn_ic.enabled .Values.pod.tolerations.ovn_ic.tolerations }}
      tolerations:
      {{- toYaml .Values.pod.tolerations.ovn_ic.tolerations | nindent 8 }}
      {{- end }}
      nodeSelector:
        {{ .Values.labels.ovn_ic.node_selector_key }}: {{ .Values.labels.ovn_ic.node_selector_value }}
      initContainers:
{{- tuple $envAll "ovn_ic" list | include "helm-toolkit.snippets.kubernetes_entrypoint_init_container" | indent 8 }}
      containers:
        - name: ovn-ic
          command:
            - /tmp/ovn-ic-bin/ovn-ic.sh
{{ tuple $envAll "ovn_ic" | include "helm-toolkit.snippets.image" | indent 10 }}
{{ tuple $envAll $envAll.Values.pod.resources.ovn_ic | include "helm-toolkit.snippets.kubernetes_resources" | indent 10 }}
{{ dict "envAll" $envAll "application" "ovn_ic" "container" "ovn_ic" | include "helm-toolkit.snippets.kubernetes_container_security_context" | indent 10 }}
{{ dict "envAll" . "component" "ovn_ic" "container" "ovn_ic" "type" "readiness" "probeTemplate" (include "ovnIcReadinessProbe" . | fromYaml) | include "helm-toolkit.snippets.kubernetes_probe" | indent 10 }}
          env:
            # Local OVN NB/SB are built as the per-pod RAFT member list directly
            # in ovn-ic.sh (helm-toolkit host_and_port_endpoint_uri_lookup over
            # endpoints.ovn_ovsdb_nb/sb.statefulset), not via single-host env.
            # The global Interconnection databases (the hub).
            - name: OVN_IC_NB_HOST
              value: {{ tuple "ovn_ic_nb" "internal" . | include "helm-toolkit.endpoints.hostname_fqdn_endpoint_lookup" }}
            - name: OVN_IC_NB_PORT
              value: {{ tuple "ovn_ic_nb" "internal" "ovsdb" . | include "helm-toolkit.endpoints.endpoint_port_lookup" | quote }}
            - name: OVN_IC_SB_HOST
              value: {{ tuple "ovn_ic_sb" "internal" . | include "helm-toolkit.endpoints.hostname_fqdn_endpoint_lookup" }}
            - name: OVN_IC_SB_PORT
              value: {{ tuple "ovn_ic_sb" "internal" "ovsdb" . | include "helm-toolkit.endpoints.endpoint_port_lookup" | quote }}
{{ if $env_ovn.common }}{{ toYaml $env_ovn.common | indent 12 }}{{ end }}
          volumeMounts:
            - name: ovn-ic-bin
              mountPath: /tmp/ovn-ic-bin
            - name: run-ovn
              mountPath: /var/run/ovn
      volumes:
        - name: ovn-ic-bin
          configMap:
            name: ovn-ic-bin
            defaultMode: 0555
        - name: run-ovn
          emptyDir: {}
{{- end }}
