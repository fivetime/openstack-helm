---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ovn-ic
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - endpoints
  - services
  verbs:
  - get
  - list
- apiGroups:
  - "batch"
  resources:
  - jobs
  verbs:
  - get
  - list
- apiGroups:
  - "apps"
  resources:
  - statefulsets
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ovn-ic
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ovn-ic
subjects:
- kind: ServiceAccount
  name: ovn-ovsdb-ic-nb
  namespace: {{ .Release.Namespace }}
- kind: ServiceAccount
  name: ovn-ovsdb-ic-sb
  namespace: {{ .Release.Namespace }}
- kind: ServiceAccount
  name: ovn-ic
  namespace: {{ .Release.Namespace }}
