{{- define "ovnIcSbReadinessProbe" }}
exec:
  command:
    - /usr/bin/ovn-appctl
    - -t
    - /var/run/ovn/ovn_ic_sb_db.ctl
    - ovsdb-server/list-dbs
{{- end }}

{{- if .Values.manifests.statefulset_ovn_ovsdb_ic_sb }}
{{- $envAll := . }}

{{- $serviceAccountName := "ovn-ovsdb-ic-sb" }}
{{ tuple $envAll "ovn_ic_sb" $serviceAccountName | include "helm-toolkit.snippets.kubernetes_pod_rbac_serviceaccount" }}

{{- $env_ovn := .Values.pod.envs }}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ovn-ovsdb-ic-sb
  annotations:
    {{ tuple $envAll | include "helm-toolkit.snippets.release_uuid" }}
  labels:
{{ tuple $envAll "ovn-ic" "ovn-ovsdb-ic-sb" | include "helm-toolkit.snippets.kubernetes_metadata_labels" | indent 4 }}
spec:
  serviceName: {{ tuple "ovn_ic_sb" "direct" . | include "helm-toolkit.endpoints.hostname_short_endpoint_lookup" }}
  podManagementPolicy: Parallel
  replicas: {{ .Values.pod.replicas.ovn_ic_sb }}
  selector:
    matchLabels:
{{ tuple $envAll "ovn-ic" "ovn-ovsdb-ic-sb" | include "helm-toolkit.snippets.kubernetes_metadata_labels" | indent 6 }}
  template:
    metadata:
      labels:
{{ tuple $envAll "ovn-ic" "ovn-ovsdb-ic-sb" | include "helm-toolkit.snippets.kubernetes_metadata_labels" | indent 8 }}
      annotations:
{{ tuple $envAll | include "helm-toolkit.snippets.release_uuid" | indent 8 }}
        configmap-bin-hash: {{ tuple "configmap-bin.yaml" . | include "helm-toolkit.utils.hash" }}
    spec:
      serviceAccountName: {{ $serviceAccountName }}
      {{- if and .Values.pod.tolerations.ovn_ic_sb.enabled .Values.pod.tolerations.ovn_ic_sb.tolerations }}
      tolerations:
      {{- toYaml .Values.pod.tolerations.ovn_ic_sb.tolerations | nindent 8 }}
      {{- end }}
      affinity:
{{- tuple $envAll "ovn-ic" "ovn-ovsdb-ic-sb" | include "helm-toolkit.snippets.kubernetes_pod_anti_affinity" | indent 8 }}
      nodeSelector:
        {{ .Values.labels.ovn_ic_sb.node_selector_key }}: {{ .Values.labels.ovn_ic_sb.node_selector_value }}
      initContainers:
{{- tuple $envAll "ovn_ic_sb" list | include "helm-toolkit.snippets.kubernetes_entrypoint_init_container" | indent 8 }}
      containers:
        - name: ovsdb
          command:
            - /tmp/ovn-ic-bin/start-ic-ovsdb.sh
{{ tuple $envAll "ovn_ic_sb" | include "helm-toolkit.snippets.image" | indent 10 }}
{{ tuple $envAll $envAll.Values.pod.resources.ovn_ic_sb | include "helm-toolkit.snippets.kubernetes_resources" | indent 10 }}
{{ dict "envAll" $envAll "application" "ovn_ic_sb" "container" "ovsdb" | include "helm-toolkit.snippets.kubernetes_container_security_context" | indent 10 }}
{{ dict "envAll" . "component" "ovn_ic_sb" "container" "ovsdb" "type" "readiness" "probeTemplate" (include "ovnIcSbReadinessProbe" . | fromYaml) | include "helm-toolkit.snippets.kubernetes_probe" | indent 10 }}
          ports:
            - containerPort: {{ tuple "ovn_ic_sb" "internal" "ovsdb" . | include "helm-toolkit.endpoints.endpoint_port_lookup" }}
          env:
            - name: OVN_IC_DB
              value: "sb"
            - name: OVN_IC_PORT
              value: {{ tuple "ovn_ic_sb" "internal" "ovsdb" . | include "helm-toolkit.endpoints.endpoint_port_lookup" | quote }}
            - name: OVN_IC_DBDIR
              value: {{ $envAll.Values.volume.ovn_ic_sb.path | quote }}
{{ if $env_ovn.common }}{{ toYaml $env_ovn.common | indent 12 }}{{ end }}
          volumeMounts:
            - name: ovn-ic-bin
              mountPath: /tmp/ovn-ic-bin
            - name: run-ovn
              mountPath: /var/run/ovn
            - name: data
              mountPath: {{ $envAll.Values.volume.ovn_ic_sb.path }}
      volumes:
        - name: ovn-ic-bin
          configMap:
            name: ovn-ic-bin
            defaultMode: 0555
        - name: run-ovn
          emptyDir: {}
{{- if not .Values.volume.ovn_ic_sb.enabled }}
        - name: data
          emptyDir: {}
{{- else }}
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ $envAll.Values.volume.ovn_ic_sb.class_name }}
        resources:
          requests:
            storage: {{ $envAll.Values.volume.ovn_ic_sb.size }}
{{- end }}

{{- end }}
