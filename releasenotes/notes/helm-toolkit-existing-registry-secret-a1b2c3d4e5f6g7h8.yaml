---
features:
  - |
    Add support for using existing image registry secrets in ServiceAccounts.

    The ``imagePullSecrets`` field on ServiceAccounts is now controlled solely
    by ``endpoints.oci_image_registry.auth.enabled``. When auth is enabled,
    the secret name is always looked up from ``secrets.oci_image_registry``.

    To use an existing registry secret without creating a new one, set
    ``manifests.secret_registry: false`` and configure the existing secret
    name via ``secrets.oci_image_registry``::

      # Use an existing shared registry secret
      manifests:
        secret_registry: false
      secrets:
        oci_image_registry:
          <chart-name>: "my-shared-registry-secret"
      endpoints:
        oci_image_registry:
          auth:
            enabled: true
...
