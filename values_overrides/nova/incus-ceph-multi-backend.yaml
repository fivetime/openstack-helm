---
# Shared rootfs plus BFV support for multiple Cinder RBD backends. Ceph
# configuration and credentials are reused from ceph_client and conf.ceph.
manifests:
  daemonset_compute_incus: true

incus_storage:
  default_root_pool: ceph-rootfs
  root_pools:
    ceph-rootfs:
      driver: ceph
      source: incus-rootfs-rbd-pool
  boot_from_volume_pools:
    # Match Cinder's rbd_pool (the image namespace), not rbd_data_pool. EC
    # and replicated volume types can therefore share one cephext mapping.
    cinder-ssd:
      driver: cephext
      source: ssd-rep3-rbd-pool
    cinder-nvme:
      driver: cephext
      source: nvme-rep3-rbd-pool
    cinder-hybrid:
      driver: cephext
      source: hybrid-rep3-rbd-pool
    cinder-hdd:
      driver: cephext
      source: hdd-rep3-rbd-pool
